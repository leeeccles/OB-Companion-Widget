<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: visible;
  }
  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-size: 20px;
    font-weight: 700;
    line-height: 1.3;
    letter-spacing: 0.02em;
    color: #333333;
    white-space: nowrap;
  }
  .ai {
    /* Light stop capped at #8A8A8A — #E4E4E4 dropped to 1.3:1 contrast
       against the platform's near-white background, well below the 3:1
       minimum for large bold text (WCAG 1.4.3). #8A8A8A holds ~3.45:1. */
    background: linear-gradient(100deg, #6E6F6E 0%, #6E6F6E 35%, #8A8A8A 50%, #6E6F6E 65%, #6E6F6E 100%);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer {
    0%   { background-position: 100% 0; }
    100% { background-position: -100% 0; }
  }
  .cursor {
    display: inline-block;
    color: #333333;
    margin-left: 1px;
    opacity: 1;
    animation: blink 0.82s ease-in-out infinite alternate;
    animation-play-state: paused;
  }
  @keyframes blink {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }
  body.reading .cursor {
    animation-play-state: running;
  }
  @media (prefers-reduced-motion: reduce) {
    .cursor { animation: none; }
    /* Static solid tone instead of freezing on a gradient frame — avoids
       landing on a low-contrast point of the sweep. */
    .ai { animation: none; background: none; -webkit-text-fill-color: #6E6F6E; color: #6E6F6E; }
  }
</style>
</head>
<body>
<span aria-hidden="true">Ask&nbsp;<span class="ai">✦ Companion</span>:&nbsp;<span id="t"></span><span class="cursor" id="c">|</span></span>
<script>
(function(){
  var Q = [
    "When is pay day?",
    "How do I redeem a gift card?",
    "How should I use AI in my role?"
  ];
  var t = document.getElementById('t');
  var c = document.getElementById('c');
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    t.textContent = Q[0]; c.style.display = 'none'; return;
  }
  var qi = 0, ci = 0, del = false, paused = false, timer = null;
  var body = document.body;

  function tick() {
    if (paused) return;
    var q = Q[qi];
    if (!del) {
      t.textContent = q.slice(0, ++ci);
      if (ci === q.length) {
        del = true;
        body.classList.add('reading');
        timer = setTimeout(tick, 3500);
        return;
      }
      body.classList.remove('reading');
      timer = setTimeout(tick, 80);
    } else {
      body.classList.remove('reading');
      t.textContent = q.slice(0, --ci);
      if (ci === 0) { del = false; qi = (qi + 1) % Q.length; timer = setTimeout(tick, 500); return; }
      timer = setTimeout(tick, 42);
    }
  }

  function pause() { paused = true; clearTimeout(timer); }
  function resume() { paused = false; tick(); }

  t.parentNode.addEventListener('mouseenter', pause);
  t.parentNode.addEventListener('mouseleave', resume);
  document.addEventListener('visibilitychange', function() {
    document.hidden ? pause() : resume();
  });

  timer = setTimeout(tick, 600);
}());
</script>
</body>
</html>
